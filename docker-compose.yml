services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mds
      POSTGRES_USER: mds
      POSTGRES_PASSWORD: mds
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mds -d mds"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: dev-secret-key
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:${FRONTEND_HOST_PORT:-3000}
      POSTGRES_DB: mds
      POSTGRES_USER: mds
      POSTGRES_PASSWORD: mds
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python manage.py migrate && python manage.py seed && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_HOST_PORT:-8000}/api
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
